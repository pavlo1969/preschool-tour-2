<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Preschool Tour</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ── Splash screen ─────────────────────────────────────────────────── -->
  <div id="splash-screen">
    <div class="splash-bg"></div>
    <div class="splash-content">
      <div class="splash-icon">🏫</div>
      <h1 class="splash-title">Welcome to<br><span>Our Preschool</span></h1>
      <p class="splash-subtitle">A guided tour just for you</p>
      <div class="splash-loader">
        <div class="loader-bar"></div>
      </div>
    </div>
    <div class="splash-bubbles">
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
    </div>
  </div>

  <!-- ── Video screen ──────────────────────────────────────────────────── -->
  <div id="video-screen" class="screen">
    <video id="tour-video" playsinline webkit-playsinline>
      <source id="video-src" src="" type="video/mp4">
    </video>
    <div id="video-label"></div>
    <div id="video-tap-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
      Tap to play
    </div>
  </div>

  <!-- ── Photo screen ──────────────────────────────────────────────────── -->
  <div id="photo-screen" class="screen">
    <div id="photo-container">
      <img id="tour-photo" src="" alt="Tour step" draggable="false">

      <!-- Hotspot arrow -->
      <button id="hotspot" aria-label="Continue to next step">
        <div class="hotspot-ring"></div>
        <div class="hotspot-ring hotspot-ring--2"></div>
        <div class="hotspot-inner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </button>
    </div>

    <!-- Progress indicator -->
    <div id="progress">
      <div id="progress-track">
        <div id="progress-fill"></div>
      </div>
      <div id="progress-dots"></div>
      <div id="progress-label"></div>
    </div>
  </div>

  <!-- ── Tour complete overlay ─────────────────────────────────────────── -->
  <div id="complete-screen" class="screen">
    <video id="outro-video" playsinline webkit-playsinline>
      <source id="outro-src" src="" type="video/mp4">
    </video>
    <div id="complete-overlay">
      <div class="complete-icon">🎉</div>
      <h2 class="complete-title">You've Arrived!</h2>
      <p class="complete-sub">Thanks for exploring our preschool</p>
      <button id="restart-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-4.51"/>
        </svg>
        Start Over
      </button>
    </div>
  </div>

  <!-- ── Transition overlay ────────────────────────────────────────────── -->
  <div id="transition-overlay"></div>

</div>

<script src="js/app.js"></script>
</body>
</html>
